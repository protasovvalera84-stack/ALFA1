# ═══════════════════════════════════════════════════════════════
# Nginx reverse proxy для Альфа Юнит-1
# Поддерживает HTTP → HTTPS редирект + SSL
# ═══════════════════════════════════════════════════════════════

# ── HTTP → HTTPS redirect ────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name alfaunit1.ru www.alfaunit1.ru;

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS server ─────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name alfaunit1.ru www.alfaunit1.ru;

    # SSL — Let's Encrypt certificates
    # Получить: certbot certonly --standalone -d alfaunit1.ru -d www.alfaunit1.ru
    ssl_certificate     /etc/letsencrypt/live/alfaunit1.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/alfaunit1.ru/privkey.pem;

    # Modern SSL configuration (Mozilla Intermediate 2026)
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # HSTS (1 year) — enable only after verifying HTTPS works correctly
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Security headers
    add_header X-Content-Type-Options  "nosniff"           always;
    add_header X-Frame-Options         "DENY"              always;
    add_header X-XSS-Protection        "1; mode=block"     always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # Static files (cache for 30 days — they're versioned by Go embed)
    location ~* \.(css|js|woff2?|ico|png|jpg|jpeg|svg|gif|webp|avif)$ {
        proxy_pass         http://app:8080;
        proxy_cache_valid  200 30d;
        add_header         Cache-Control "public, max-age=2592000, immutable";
        expires            30d;
    }

    # SEO files — short cache
    location = /robots.txt {
        proxy_pass http://app:8080;
        add_header Cache-Control "public, max-age=3600";
    }

    location = /sitemap.xml {
        proxy_pass http://app:8080;
        add_header Cache-Control "public, max-age=3600";
    }

    # Everything else — proxy to Go app
    location / {
        proxy_pass         http://app:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # Deny hidden files (Git, env, etc.)
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Deny direct access to data directory
    location ~* \.(db|env|log)$ {
        deny all;
    }

    # Access log
    access_log /var/log/nginx/alfa1_access.log;
    error_log  /var/log/nginx/alfa1_error.log warn;
}
