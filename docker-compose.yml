# ═══════════════════════════════════════════════════════════════
# Альфа Юнит-1 — Docker Compose (Compose v2, Ubuntu 24.04+)
# Запуск (без nginx, порт 80):  docker compose up -d
# Запуск (с nginx/HTTPS):       docker compose --profile nginx up -d
# Остановка:                    docker compose down
# Логи:                         docker compose logs -f
# Пересборка:                   docker compose up -d --build
# ═══════════════════════════════════════════════════════════════

# NOTE: поле "version" убрано — оно устарело в Compose v2 (Docker ≥ 23)

services:

  # ── Go application ───────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alfa1_app
    restart: always
    env_file:
      - path: .env
        required: false   # не падать если .env ещё не создан
    environment:
      - PORT=8080
      - DB_PATH=/app/data/alfa1.db
      - APP_ENV=production
    volumes:
      # Сохраняем SQLite-базу между перезапусками
      - alfa1_data:/app/data
    ports:
      # Режим без nginx: сайт доступен напрямую на порту 80
      - "80:8080"
    networks:
      - alfa1_net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/ > /dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ── Nginx (только с профилем nginx) ──────────────────────────
  # Подключить после получения SSL:
  #   certbot certonly --standalone -d ВАШИ_ДОМЕН
  #   docker compose --profile nginx up -d
  nginx:
    image: nginx:alpine
    container_name: alfa1_nginx
    restart: always
    profiles:
      - nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - certbot_webroot:/var/www/certbot:ro
    depends_on:
      - app
    networks:
      - alfa1_net
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # ── Certbot — авто-продление SSL (только с профилем nginx) ───
  certbot:
    image: certbot/certbot:latest
    container_name: alfa1_certbot
    profiles:
      - nginx
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt
      - certbot_webroot:/var/www/certbot
    entrypoint: >
      /bin/sh -c "trap exit TERM;
      while :; do
        certbot renew --webroot -w /var/www/certbot --quiet;
        sleep 12h;
      done"

volumes:
  alfa1_data:
    name: alfa1_data
  certbot_webroot:
    name: alfa1_certbot_webroot

networks:
  alfa1_net:
    name: alfa1_network
    driver: bridge
